stages:

  # ------------------------------------------------------------------ #
  # Stage 1 – Download data and build clean manifest                    #
  # ------------------------------------------------------------------ #
  download:
    foreach: ${languages}
    do:
      cmd: python src/download_data.py --lang ${item} --params params.yaml
      deps:
        - src/download_data.py
        - params.yaml
      params:
        - languages
        - data
        - model.target_sr
      outs:
        - data/raw/${item}
        - data/manifests/${item}/clean.jsonl:
            cache: false

  # ------------------------------------------------------------------ #
  # Stage 2 – Phonemize reference transcriptions                        #
  # ------------------------------------------------------------------ #
  phonemize:
    foreach: ${languages}
    do:
      cmd: python src/phonemize.py --lang ${item} --params params.yaml
      deps:
        - src/phonemize.py
        - data/manifests/${item}/clean.jsonl
        - params.yaml
      params:
        - languages

  # ------------------------------------------------------------------ #
  # Stage 3 – Add Gaussian noise at each SNR level                      #
  # ------------------------------------------------------------------ #
  add_noise:
    foreach: ${languages}
    do:
      cmd: python src/add_noise.py --lang ${item} --params params.yaml
      deps:
        - src/add_noise.py
        - data/manifests/${item}/clean.jsonl
        - params.yaml
      params:
        - snr_levels
        - seed
      outs:
        - data/noisy/${item}
        - data/manifests/${item}/noisy_snrm5.jsonl:
            cache: false
        - data/manifests/${item}/noisy_snrp0.jsonl:
            cache: false
        - data/manifests/${item}/noisy_snrp5.jsonl:
            cache: false
        - data/manifests/${item}/noisy_snrp10.jsonl:
            cache: false
        - data/manifests/${item}/noisy_snrp15.jsonl:
            cache: false
        - data/manifests/${item}/noisy_snrp20.jsonl:
            cache: false
        - data/manifests/${item}/noisy_snrp25.jsonl:
            cache: false
        - data/manifests/${item}/noisy_snrp30.jsonl:
            cache: false
        - data/manifests/${item}/noisy_snrp35.jsonl:
            cache: false
        - data/manifests/${item}/noisy_snrp40.jsonl:
            cache: false

  # ------------------------------------------------------------------ #
  # Stage 4 – Phoneme inference                                         #
  # ------------------------------------------------------------------ #
  inference:
    foreach: ${languages}
    do:
      cmd: python src/run_inference.py --lang ${item} --params params.yaml
      deps:
        - src/run_inference.py
        - data/manifests/${item}/clean.jsonl
        - data/manifests/${item}/noisy_snrm5.jsonl
        - data/manifests/${item}/noisy_snrp0.jsonl
        - data/manifests/${item}/noisy_snrp5.jsonl
        - data/manifests/${item}/noisy_snrp10.jsonl
        - data/manifests/${item}/noisy_snrp15.jsonl
        - data/manifests/${item}/noisy_snrp20.jsonl
        - data/manifests/${item}/noisy_snrp25.jsonl
        - data/manifests/${item}/noisy_snrp30.jsonl
        - data/manifests/${item}/noisy_snrp35.jsonl
        - data/manifests/${item}/noisy_snrp40.jsonl
        - params.yaml
      params:
        - model
      outs:
        - data/predictions/${item}

  # ------------------------------------------------------------------ #
  # Stage 5 – Evaluate PER                                              #
  # ------------------------------------------------------------------ #
  evaluate:
    foreach: ${languages}
    do:
      cmd: python src/evaluate.py --lang ${item} --params params.yaml
      deps:
        - src/evaluate.py
        - data/predictions/${item}
        - params.yaml
      metrics:
        - data/metrics/${item}/per.json:
            cache: false

  # ------------------------------------------------------------------ #
  # Stage 6 – Plot PER vs SNR                                           #
  # ------------------------------------------------------------------ #
  plot:
    cmd: python src/plot_results.py --params params.yaml
    deps:
      - src/plot_results.py
      - params.yaml
      - data/metrics/fr/per.json
      - data/metrics/de/per.json
    plots:
      - data/figures/per_vs_snr.png
